<nav class="flex items-center justify-between px-6 lg:px-12 h-16 bg-white border-b border-gray-200">
  <div class="flex items-center gap-12 lg:gap-16">
    <a href="#" class="text-xl font-bold text-blue-700 no-underline">Ecommerce</a>
    <div class="hidden md:flex gap-10">
      <a routerLink="/shop" routerLinkActive="!text-blue-700 !border-blue-700"
        class="text-gray-600 text-sm font-medium py-5 border-b-2 border-transparent">Shop</a>
      <a routerLink="/categories" routerLinkActive="!text-blue-700 !border-blue-700"
        class="text-gray-600 text-sm font-medium py-5 border-b-2 border-transparent">Categories</a>
      <a routerLink="/shop" routerLinkActive="!text-blue-700 !border-blue-700"
        class="text-gray-600 text-sm font-medium py-5 border-b-2 border-transparent">Products</a>
      @if (isLoggedIn) {
        <a routerLink="/orders" routerLinkActive="!text-blue-700 !border-blue-700"
          class="text-gray-600 text-sm font-medium py-5 border-b-2 border-transparent">Orders</a>
        <a routerLink="/users/dashboard" routerLinkActive="!text-blue-700 !border-blue-700"
          class="text-gray-600 text-sm font-medium py-5 border-b-2 border-transparent">Dashboard</a>
      }
    </div>
  </div>

  <div class="flex items-center gap-4 lg:gap-6">

    <a routerLink="/cart" class="relative text-gray-500 hover:text-blue-700" aria-label="Cart">
      <i class="fa-solid fa-cart-shopping text-xl"></i>
      @if (cartState.count$ | async; as count) {
        <span
          class="absolute -top-2 -right-2 flex h-5 w-5 items-center justify-center
                 rounded-full bg-red-600 text-[10px] font-bold text-white">
          {{ count > 99 ? '99+' : count }}
        </span>
      }
    </a>

    <button
      class="bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-full w-9 h-9"
      aria-label="User Profile">
      <i class="fa-solid fa-user text-sm"></i>
    </button>
  </div>
</nav>
