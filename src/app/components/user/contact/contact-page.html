<div class="min-h-screen bg-stone-50 text-stone-900 py-16 px-4 md:px-8">
  
  <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12 lg:gap-24">
    
    <div class="flex flex-col space-y-10">
      <div>
        <h1 class="text-4xl md:text-5xl font-extralight uppercase tracking-[0.2em] mb-4">
          Get in Touch
        </h1>
        <p class="text-stone-600 max-w-md leading-relaxed">
          Our concierge team is here to assist with product inquiries, bespoke commissions, or design object services.
        </p>
      </div>

      <div class="space-y-6 text-stone-700">
        <div class="flex items-center space-x-4">
          <svg class="w-6 h-6 text-stone-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          <span class="text-lg font-light">concierge@atelierarc.com</span>
        </div>
        <div class="flex items-center space-x-4">
          <svg class="w-6 h-6 text-stone-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
          <span class="text-lg font-light">+1 (555) 123 4567</span>
        </div>
      </div>
    </div>

    <div class="bg-white p-8 md:p-12 border border-stone-100 shadow-sm rounded-lg">
      <form class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-stone-600 mb-1.5" for="name">Name</label>
          <input type="text" id="name" class="w-full px-4 py-2.5 bg-stone-50 border border-stone-100 rounded focus:ring-1 focus:ring-stone-400 focus:border-stone-400 transition" placeholder="Your name">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-stone-600 mb-1.5" for="email">Email</label>
          <input type="email" id="email" class="w-full px-4 py-2.5 bg-stone-50 border border-stone-100 rounded focus:ring-1 focus:ring-stone-400 focus:border-stone-400 transition" placeholder="your.email@example.com">
        </div>

        <div>
          <label class="block text-sm font-medium text-stone-600 mb-1.5" for="message">Message</label>
          <textarea id="message" rows="5" class="w-full px-4 py-2.5 bg-stone-50 border border-stone-100 rounded focus:ring-1 focus:ring-stone-400 focus:border-stone-400 transition" placeholder="Tell us about your inquiry..."></textarea>
        </div>

        <div>
          <button type="submit" class="w-full md:w-auto px-8 py-3 bg-stone-900 text-white rounded font-medium hover:bg-stone-800 transition duration-300">
            Send Inquiry
          </button>
        </div>
      </form>
    </div>
    
  </div>
</div>
