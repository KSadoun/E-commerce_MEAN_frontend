<div class="min-h-screen bg-[#f7f3ee] text-stone-900">
  <app-home-header [navLinks]="navLinks" [isAuthenticated]="isAuthenticated()" />

  <main class="mx-auto w-full max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <header class="mb-8">
      <p class="text-xs uppercase tracking-[0.28em] text-stone-500">Browse</p>
      <h1 class="mt-2 text-3xl font-semibold text-stone-900">All Categories</h1>
      <p class="mt-2 text-sm text-stone-500">Explore catalog categories with live item counts.</p>
    </header>

    @if (loading()) {
      <div
        class="rounded-2xl border border-stone-200 bg-white p-6 text-sm text-stone-500 shadow-sm"
      >
        Loading categories...
      </div>
    } @else {
      <section class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3">
        @for (category of categories(); track category.id) {
          <a
            [routerLink]="'/shop'"
            [queryParams]="{ material: category.name }"
            class="group overflow-hidden rounded-2xl border border-stone-200 bg-white shadow-sm transition hover:-translate-y-1 hover:shadow-lg"
          >
            <div class="relative h-48 overflow-hidden">
              <img
                [src]="category.imageUrl"
                [alt]="category.name"
                class="h-full w-full object-cover transition duration-500 group-hover:scale-105"
                loading="lazy"
              />
            </div>
            <div class="p-4">
              <h2 class="text-lg font-semibold text-stone-900">{{ category.name }}</h2>
              <p class="mt-1 text-sm text-stone-500">{{ category.itemCount }} items</p>
            </div>
          </a>
        }
      </section>
    }
  </main>

  <app-home-footer [linkGroups]="footerLinks" [companyDescription]="companyDescription" />
</div>
