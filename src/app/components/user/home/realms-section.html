<section class="bg-[#f7f3ee] py-14 md:py-16">
  <div class="mx-auto max-w-7xl px-4 md:px-6 lg:px-8">
    <div class="mb-8 flex items-center justify-between">
      <div>
        <p class="text-xs uppercase tracking-[0.28em] text-stone-500">Curated Categories</p>
        <h2 class="mt-2 text-2xl font-semibold text-stone-900 md:text-3xl">Realms of Design</h2>
      </div>
      <a
        routerLink="/categories"
        class="text-sm font-medium text-stone-700 underline underline-offset-4 transition hover:text-stone-950"
        >View All Categories</a
      >
    </div>

    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
      @for (category of categories(); track category.id) {
        <article class="group overflow-hidden rounded-2xl border border-stone-200 bg-stone-100/70">
          <div class="relative h-52 overflow-hidden">
            <img
              [src]="category.imageUrl"
              [alt]="category.name"
              class="h-full w-full object-cover transition duration-500 group-hover:scale-105"
              loading="lazy"
            />
          </div>
          <div class="space-y-1 px-4 py-4">
            <h3 class="text-base font-semibold text-stone-900">{{ category.name }}</h3>
            <p class="text-sm text-stone-600">{{ category.itemCount }} items</p>
          </div>
        </article>
      }
    </div>
  </div>
</section>
