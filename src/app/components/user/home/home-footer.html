<footer class="bg-[#1e1b17] pb-6 pt-12 text-stone-300">
  <div
    class="mx-auto grid max-w-7xl grid-cols-1 gap-8 px-4 md:grid-cols-[1.3fr_1fr] md:px-6 lg:px-8"
  >
    <div>
      <p class="text-sm uppercase tracking-[0.32em] text-stone-400">Atelier Arc</p>
      <p class="mt-4 max-w-md text-sm leading-7 text-stone-300/90">{{ companyDescription() }}</p>
      <div class="mt-6 flex items-center gap-2">
        <button
          type="button"
          aria-label="Instagram"
          class="rounded-full border border-stone-500 p-2 transition hover:border-stone-200 hover:text-stone-100"
        >
          <span class="material-symbols-outlined text-[19px]">photo_camera</span>
        </button>
        <button
          type="button"
          aria-label="Pinterest"
          class="rounded-full border border-stone-500 p-2 transition hover:border-stone-200 hover:text-stone-100"
        >
          <span class="material-symbols-outlined text-[19px]">push_pin</span>
        </button>
        <button
          type="button"
          aria-label="YouTube"
          class="rounded-full border border-stone-500 p-2 transition hover:border-stone-200 hover:text-stone-100"
        >
          <span class="material-symbols-outlined text-[19px]">play_circle</span>
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 gap-6 sm:grid-cols-3">
      @for (group of linkGroups(); track group.title) {
        <div>
          <h3 class="text-sm font-semibold uppercase tracking-wider text-stone-200">
            {{ group.title }}
          </h3>
          <ul class="mt-3 space-y-2">
            @for (link of group.links; track link.label) {
              <li>
                <a
                  [href]="link.href"
                  class="text-sm text-stone-300/90 transition hover:text-white"
                  >{{ link.label }}</a
                >
              </li>
            }
          </ul>
        </div>
      }
    </div>
  </div>

  <div
    class="mx-auto mt-10 max-w-7xl border-t border-stone-700/70 px-4 pt-6 text-xs text-stone-400 md:px-6 lg:px-8"
  >
    © 2026 Atelier Arc. All rights reserved.
  </div>
</footer>
