<section class="bg-[#fcfaf7] py-14 md:py-16">
  <div class="mx-auto max-w-7xl px-4 md:px-6 lg:px-8">
    <div class="mb-8 flex items-center justify-between">
      <div>
        <p class="text-xs uppercase tracking-[0.28em] text-stone-500">Top Products</p>
        <h2 class="mt-2 text-2xl font-semibold text-stone-900 md:text-3xl">
          Editor Picks For Your Space
        </h2>
      </div>
      <a
        routerLink="/shop"
        class="text-sm font-medium text-stone-700 underline underline-offset-4 transition hover:text-stone-950"
        >View Full Shop</a
      >
    </div>

    <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 xl:grid-cols-4">
      @for (product of products(); track product.id) {
        <article
          class="overflow-hidden rounded-2xl border border-stone-200 bg-white shadow-sm shadow-stone-100/70 transition hover:-translate-y-1 hover:shadow-lg hover:shadow-stone-200/50"
        >
          <div class="relative h-56 overflow-hidden">
            <img
              [src]="product.imageUrl"
              [alt]="product.title"
              class="h-full w-full object-cover"
              loading="lazy"
            />
            @if (product.label) {
              <span
                class="absolute left-3 top-3 rounded-full border border-stone-300 bg-white/90 px-3 py-1 text-xs font-semibold text-stone-700"
              >
                {{ product.label }}
              </span>
            }
          </div>
          <div class="space-y-2 px-4 py-4">
            <h3 class="text-base font-semibold text-stone-900">{{ product.title }}</h3>
            <p class="text-sm text-stone-500">{{ product.category }}</p>
            <p class="pt-1 text-lg font-semibold text-stone-900">
              ${{ product.price | number: '1.0-0' }}
            </p>
          </div>
        </article>
      }
    </div>
  </div>
</section>
