<section
  class="relative isolate overflow-hidden"
  [style.background-image]="
    'linear-gradient(90deg, rgba(28,26,24,0.72) 10%, rgba(28,26,24,0.2) 60%), url(' +
    imageUrl() +
    ')'
  "
  style="background-size: cover; background-position: center"
>
  <div
    class="mx-auto flex min-h-[68vh] max-w-7xl items-end px-4 pb-14 pt-24 md:min-h-[74vh] md:px-6 lg:px-8"
  >
    <div class="max-w-xl space-y-5 text-stone-100">
      <p class="text-xs uppercase tracking-[0.35em] text-stone-200/90">
        Architectural Furniture Collection
      </p>
      <h1 class="text-4xl font-semibold leading-tight md:text-5xl">{{ headline() }}</h1>
      <p class="max-w-lg text-sm leading-7 text-stone-200/90 md:text-base">{{ subtitle() }}</p>
      <div class="flex flex-wrap gap-3 pt-2">
        <a
          routerLink="/shop"
          class="rounded-full bg-stone-100 px-6 py-3 text-sm font-semibold text-stone-900 transition hover:bg-white"
        >
          Explore Collections
        </a>
        <button
          type="button"
          class="rounded-full border border-stone-200/80 bg-transparent px-6 py-3 text-sm font-semibold text-stone-100 transition hover:bg-stone-100/10"
        >
          View Lookbook
        </button>
      </div>
    </div>
  </div>
</section>
