<div class="admin-shell min-h-screen bg-slate-100 dark:bg-slate-950">
  <app-loading-overlay></app-loading-overlay>
  <div
    class="fixed inset-0 z-30 bg-slate-950/40 transition-opacity lg:hidden"
    [class.pointer-events-none]="!mobileOpen()"
    [class.opacity-0]="!mobileOpen()"
    [class.opacity-100]="mobileOpen()"
    (click)="closeMobileMenu()"
  ></div>

  <app-admin-sidebar
    [collapsed]="collapsed()"
    [mobileOpen]="mobileOpen()"
    (toggleCollapse)="toggleCollapse()"
    (closeMobileMenu)="closeMobileMenu()"
  ></app-admin-sidebar>

  <div
    class="admin-content min-w-0 flex-1 transition-all duration-300"
    [class.is-collapsed]="collapsed()"
  >
    <app-admin-navbar
      (toggleMobileMenu)="toggleMobileMenu()"
    ></app-admin-navbar>
    <main class="p-4 sm:p-6 lg:p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
