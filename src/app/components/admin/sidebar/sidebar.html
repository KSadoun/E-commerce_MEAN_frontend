<aside
  class="admin-sidebar fixed left-0 top-0 z-40 flex h-screen border-r border-slate-200 bg-slate-50 py-6 transition-all duration-300 dark:border-slate-800 dark:bg-slate-950"
  [class.collapsed]="collapsed()"
  [class.mobile-open]="mobileOpen()"
>
  <div class="flex h-full w-full flex-col">
    <div class="mb-6 flex items-center justify-between px-6" [class.px-2]="collapsed()">
      <div [class.hidden]="collapsed()">
        <h2 class="truncate text-lg font-bold text-slate-900 dark:text-slate-100">E-Commerce</h2>
        <p class="text-xs font-medium text-slate-500">Admin Portal</p>
      </div>
      <button
        type="button"
        (click)="toggleCollapse.emit()"
        class="rounded-lg p-2 text-slate-600 transition hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800"
        aria-label="Toggle sidebar"
      >
        <span class="material-symbols-outlined">left_panel_open</span>
      </button>
    </div>

    <nav class="space-y-1 px-2">
      <a
        routerLink="/admin"
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive="bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300"
        (click)="handleMenuClick()"
        class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-slate-500 transition-all duration-200 hover:translate-x-1 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-900"
      >
        <span class="material-symbols-outlined text-[20px]">space_dashboard</span>
        @if (!collapsed()) {
          <span>Dashboard</span>
        }
      </a>

      <a
        routerLink="/admin/users"
        routerLinkActive="bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300"
        (click)="handleMenuClick()"
        class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-slate-500 transition-all duration-200 hover:translate-x-1 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-900"
      >
        <span class="material-symbols-outlined text-[20px]">groups</span>
        @if (!collapsed()) {
          <span>Users</span>
        }
      </a>

      <a
        routerLink="/admin/products"
        routerLinkActive="bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300"
        (click)="handleMenuClick()"
        class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-slate-500 transition-all duration-200 hover:translate-x-1 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-900"
      >
        <span class="material-symbols-outlined text-[20px]">shopping_bag</span>
        @if (!collapsed()) {
          <span>Products</span>
        }
      </a>

      <a
        routerLink="/admin/categories"
        routerLinkActive="bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300"
        (click)="handleMenuClick()"
        class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-slate-500 transition-all duration-200 hover:translate-x-1 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-900"
      >
        <span class="material-symbols-outlined text-[20px]">category</span>
        @if (!collapsed()) {
          <span>Categories</span>
        }
      </a>
    </nav>

    <div class="mt-auto border-t border-slate-200 px-2 pt-4 dark:border-slate-800">
      <button
        type="button"
        (click)="logout()"
        class="flex w-full items-center justify-center gap-2 rounded-lg px-3 py-2.5 text-sm font-medium text-slate-500 transition-all hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-900"
      >
        <span class="material-symbols-outlined text-[18px]">logout</span>
        @if (!collapsed()) {
          <span>Logout</span>
        }
      </button>
    </div>
  </div>
</aside>
