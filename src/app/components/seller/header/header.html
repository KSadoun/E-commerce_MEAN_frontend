<header
  class="sticky top-0 z-40 border-b border-slate-200 bg-white/80 backdrop-blur-xl dark:border-slate-800 dark:bg-slate-900/80"
>
  <div
    class="mx-auto flex w-full max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8"
  >
    <div class="flex items-center gap-2">
      <button
        type="button"
        (click)="onToggleMobileMenu()"
        class="inline-flex rounded-lg p-2 text-slate-600 transition hover:bg-slate-100 lg:hidden dark:text-slate-300 dark:hover:bg-slate-800"
        aria-label="Open menu"
      >
        <span class="material-symbols-outlined">menu</span>
      </button>

      <button
        type="button"
        (click)="onToggleSidebar()"
        class="hidden rounded-lg p-2 text-slate-600 transition hover:bg-slate-100 lg:inline-flex dark:text-slate-300 dark:hover:bg-slate-800"
        aria-label="Toggle sidebar"
      >
        <span class="material-symbols-outlined">left_panel_open</span>
      </button>

      <h1 class="text-2xl font-black tracking-tight text-blue-800 dark:text-blue-300">
        Seller Dashboard
      </h1>
    </div>

    <div class="flex items-center gap-3">
      <button
        type="button"
        class="relative rounded-full p-2 text-slate-600 transition hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800"
        aria-label="Notifications"
      >
        <span class="material-symbols-outlined">notifications</span>
        <span class="absolute right-1 top-1 h-2.5 w-2.5 rounded-full bg-blue-500"></span>
      </button>

      <div class="flex items-center gap-3 border-l border-slate-200 pl-3 dark:border-slate-700">
        <img
          [src]="sellerAvatar()"
          [alt]="sellerName()"
          class="h-10 w-10 rounded-full border-2 border-blue-500/40 object-cover"
        />
        <div class="hidden sm:block">
          <p class="text-sm font-bold text-slate-800 dark:text-slate-100">{{ sellerName() }}</p>
          <p class="text-xs text-slate-500 dark:text-slate-400">Seller account</p>
        </div>
      </div>
    </div>
  </div>
</header>
