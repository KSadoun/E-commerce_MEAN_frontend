<section
  class="mt-6 rounded-2xl border border-slate-200 bg-white p-5 shadow-lg shadow-slate-200/60 dark:border-slate-800 dark:bg-slate-900 dark:shadow-none"
>
  <div class="mb-4 flex items-center justify-between">
    <h2 class="text-xl font-bold text-slate-900 dark:text-slate-100">Recent Orders</h2>
    <span class="text-sm text-slate-500 dark:text-slate-400"
      >Last {{ orders().length }} orders</span
    >
  </div>

  <div class="overflow-x-auto">
    <table class="min-w-full overflow-hidden rounded-xl">
      <thead>
        <tr class="text-left text-xs uppercase tracking-wide text-slate-500 dark:text-slate-400">
          <th class="px-3 py-2">Order ID</th>
          <th class="px-3 py-2">Customer</th>
          <th class="px-3 py-2">Date</th>
          <th class="px-3 py-2">Total</th>
          <th class="px-3 py-2">Status</th>
        </tr>
      </thead>
      <tbody>
        @for (order of orders(); track order.id) {
          <tr
            class="transition-colors hover:bg-blue-50/60 dark:hover:bg-blue-900/20"
            [class.bg-slate-50]="$odd"
            [class.dark:bg-slate-800/50]="$odd"
            [class.bg-white]="$even"
            [class.dark:bg-slate-900]="$even"
          >
            <td class="px-3 py-3 text-sm font-semibold text-slate-900 dark:text-slate-100">
              {{ order.id }}
            </td>
            <td class="px-3 py-3 text-sm text-slate-700 dark:text-slate-300">
              {{ order.customer }}
            </td>
            <td class="px-3 py-3 text-sm text-slate-700 dark:text-slate-300">
              {{ order.date | date: 'mediumDate' }}
            </td>
            <td class="px-3 py-3 text-sm font-semibold text-slate-900 dark:text-slate-100">
              {{ order.total | currency: 'USD' }}
            </td>
            <td class="px-3 py-3 text-sm">
              <span
                class="rounded-full px-2.5 py-1 text-xs font-semibold"
                [class.bg-emerald-100]="order.status === 'Paid'"
                [class.text-emerald-700]="order.status === 'Paid'"
                [class.dark:bg-emerald-900/40]="order.status === 'Paid'"
                [class.dark:text-emerald-300]="order.status === 'Paid'"
                [class.bg-amber-100]="order.status === 'Pending'"
                [class.text-amber-700]="order.status === 'Pending'"
                [class.dark:bg-amber-900/40]="order.status === 'Pending'"
                [class.dark:text-amber-300]="order.status === 'Pending'"
                [class.bg-blue-100]="order.status === 'Shipped'"
                [class.text-blue-700]="order.status === 'Shipped'"
                [class.dark:bg-blue-900/40]="order.status === 'Shipped'"
                [class.dark:text-blue-300]="order.status === 'Shipped'"
              >
                {{ order.status }}
              </span>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
