<div class="seller-shell min-h-screen bg-slate-100 dark:bg-slate-950">
  <div
    class="fixed inset-0 z-30 bg-slate-950/40 transition-opacity lg:hidden"
    [class.pointer-events-none]="!mobileMenuOpen()"
    [class.opacity-0]="!mobileMenuOpen()"
    [class.opacity-100]="mobileMenuOpen()"
    (click)="closeMobileMenu()"
  ></div>

  <app-seller-sidebar
    [collapsed]="collapsed()"
    [mobileOpen]="mobileMenuOpen()"
    (closeMobileMenu)="closeMobileMenu()"
    (toggleCollapse)="toggleSidebar()"
  ></app-seller-sidebar>

  <div
    class="seller-content min-w-0 flex-1 transition-all duration-300"
    [class.is-collapsed]="collapsed()"
  >
    <app-seller-header
      [sellerName]="sellerName()"
      [sellerAvatar]="sellerAvatar()"
      (toggleMobileMenu)="toggleMobileMenu()"
    ></app-seller-header>
    <main class="p-4 sm:p-6 lg:p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
