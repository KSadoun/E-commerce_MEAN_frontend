<section class="mx-auto w-full max-w-7xl space-y-4">
  <header
    class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900"
  >
    <h2 class="text-2xl font-black text-slate-900 dark:text-slate-100">Customer Insights</h2>
    <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">
      View customer activity, spending, and retention patterns.
    </p>
  </header>

  <app-customers-filters
    [search]="search()"
    [segment]="segment()"
    (searchChange)="setSearch($event)"
    (segmentChange)="setSegment($event)"
  ></app-customers-filters>

  <app-customers-table
    [customers]="filteredCustomers()"
    (viewDetails)="onViewDetails($event)"
  ></app-customers-table>
</section>
