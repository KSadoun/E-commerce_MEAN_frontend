<section
  class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900"
>
  <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
    <label
      class="flex items-center gap-2 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 dark:border-slate-700 dark:bg-slate-800"
    >
      <span class="material-symbols-outlined text-slate-500">search</span>
      <input
        type="text"
        [value]="search()"
        (input)="onSearch($event)"
        placeholder="Search by name or email"
        class="w-full bg-transparent text-sm text-slate-700 outline-none placeholder:text-slate-400 dark:text-slate-200"
      />
    </label>

    <select
      [value]="segment()"
      (change)="onSegment($event)"
      class="rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm text-slate-700 outline-none dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200"
    >
      <option value="All">All Customers</option>
      <option value="Top">Top Customers</option>
      <option value="Recent">Recent Buyers</option>
    </select>
  </div>
</section>
