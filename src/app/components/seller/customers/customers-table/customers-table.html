<section
  class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-lg shadow-slate-200/70 dark:border-slate-800 dark:bg-slate-900 dark:shadow-none"
>
  <div class="overflow-x-auto">
    <table class="min-w-full">
      <thead class="bg-slate-50 dark:bg-slate-800/70">
        <tr class="text-left text-xs uppercase tracking-wide text-slate-500 dark:text-slate-400">
          <th class="px-4 py-3">Customer</th>
          <th class="px-4 py-3">Total Orders</th>
          <th class="px-4 py-3">Total Spend</th>
          <th class="px-4 py-3">Last Order</th>
          <th class="px-4 py-3">Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (customer of customers(); track customer.id) {
          <tr
            class="border-t border-slate-100 transition-colors hover:bg-blue-50/40 dark:border-slate-800 dark:hover:bg-blue-900/10"
          >
            <td class="px-4 py-3">
              <p class="text-sm font-semibold text-slate-900 dark:text-slate-100">
                {{ customer.name }}
              </p>
              <p class="text-xs text-slate-500 dark:text-slate-400">{{ customer.email }}</p>
            </td>
            <td class="px-4 py-3 text-sm text-slate-700 dark:text-slate-300">
              {{ customer.totalOrders }}
            </td>
            <td class="px-4 py-3 text-sm font-bold text-emerald-700 dark:text-emerald-300">
              {{ customer.totalSpend | currency: 'USD' }}
            </td>
            <td class="px-4 py-3 text-sm text-slate-700 dark:text-slate-300">
              {{ customer.lastOrderDate | date: 'mediumDate' }}
            </td>
            <td class="px-4 py-3">
              <div class="flex flex-wrap gap-2">
                <button
                  type="button"
                  (click)="viewDetails.emit(customer.id)"
                  class="rounded-lg border border-blue-200 px-2.5 py-1.5 text-xs font-medium text-blue-700 transition hover:bg-blue-50"
                >
                  View Details
                </button>
                <a
                  [href]="'mailto:' + customer.email"
                  class="rounded-lg border border-emerald-200 px-2.5 py-1.5 text-xs font-medium text-emerald-700 transition hover:bg-emerald-50"
                  >Contact</a
                >
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
