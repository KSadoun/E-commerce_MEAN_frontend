<section
  class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-lg shadow-slate-200/70 dark:border-slate-800 dark:bg-slate-900 dark:shadow-none"
>
  <div class="overflow-x-auto">
    <table class="min-w-full">
      <thead class="bg-slate-50 dark:bg-slate-800/70">
        <tr class="text-left text-xs uppercase tracking-wide text-slate-500 dark:text-slate-400">
          <th class="px-4 py-3">Order ID</th>
          <th class="px-4 py-3">Customer</th>
          <th class="px-4 py-3">Date</th>
          <th class="px-4 py-3">Status</th>
          <th class="px-4 py-3">Total Amount</th>
        </tr>
      </thead>
      <tbody>
        @for (order of orders(); track order.id) {
          <tr
            class="border-t border-slate-100 transition-colors hover:bg-blue-50/40 dark:border-slate-800 dark:hover:bg-blue-900/10"
            [class.bg-slate-50]="$odd"
            [class.dark:bg-slate-800/40]="$odd"
          >
            <td class="px-4 py-3 text-sm font-semibold text-slate-900 dark:text-slate-100">
              {{ order.id }}
            </td>
            <td class="px-4 py-3 text-sm text-slate-700 dark:text-slate-300">
              {{ order.customerName }}
            </td>
            <td class="px-4 py-3 text-sm text-slate-700 dark:text-slate-300">
              {{ order.date | date: 'mediumDate' }}
            </td>
            <td class="px-4 py-3">
              <span
                class="rounded-full px-2.5 py-1 text-xs font-semibold"
                [class.bg-amber-100]="order.status === 'Pending'"
                [class.text-amber-700]="order.status === 'Pending'"
                [class.bg-emerald-100]="order.status === 'Completed'"
                [class.text-emerald-700]="order.status === 'Completed'"
                [class.bg-blue-100]="order.status === 'Shipped'"
                [class.text-blue-700]="order.status === 'Shipped'"
                >{{ order.status }}</span
              >
            </td>
            <td class="px-4 py-3 text-sm font-bold text-slate-800 dark:text-slate-100">
              {{ order.totalAmount | currency: 'USD' }}
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
