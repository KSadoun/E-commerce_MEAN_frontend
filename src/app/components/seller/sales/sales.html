<section class="mx-auto w-full max-w-7xl space-y-4">
  <header
    class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900"
  >
    <h2 class="text-2xl font-black text-slate-900 dark:text-slate-100">Sales Analytics</h2>
    <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">
      Monitor revenue, orders, and performance trends with quick filters.
    </p>
  </header>

  <app-sales-metrics-cards [metrics]="metrics()"></app-sales-metrics-cards>

  <app-sales-filters
    [dateRange]="dateRange()"
    [status]="status()"
    (dateRangeChange)="setDateRange($event)"
    (statusChange)="setStatus($event)"
  ></app-sales-filters>

  <app-sales-orders-table [orders]="filteredOrders()"></app-sales-orders-table>

  <section class="grid grid-cols-1 gap-4 md:grid-cols-2">
    <article
      class="rounded-2xl border border-slate-200 bg-gradient-to-br from-blue-50 to-indigo-50 p-5 shadow-sm dark:border-slate-800 dark:from-blue-950/40 dark:to-indigo-950/30"
    >
      <h3 class="text-sm font-semibold text-slate-600 dark:text-slate-300">Sales Trend</h3>
      <div class="mt-4 flex h-24 items-end gap-2">
        <div class="w-8 rounded-t bg-blue-300" style="height: 35%"></div>
        <div class="w-8 rounded-t bg-blue-400" style="height: 55%"></div>
        <div class="w-8 rounded-t bg-blue-500" style="height: 48%"></div>
        <div class="w-8 rounded-t bg-blue-600" style="height: 74%"></div>
        <div class="w-8 rounded-t bg-blue-700" style="height: 88%"></div>
      </div>
    </article>

    <article
      class="rounded-2xl border border-slate-200 bg-gradient-to-br from-violet-50 to-fuchsia-50 p-5 shadow-sm dark:border-slate-800 dark:from-violet-950/40 dark:to-fuchsia-950/30"
    >
      <h3 class="text-sm font-semibold text-slate-600 dark:text-slate-300">Top Product Cluster</h3>
      <p class="mt-3 text-3xl font-black text-violet-700 dark:text-violet-300">Audio & Wearables</p>
      <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">
        Contributes 42% of total monthly revenue.
      </p>
    </article>
  </section>
</section>
