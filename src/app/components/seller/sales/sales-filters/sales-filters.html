<section
  class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900"
>
  <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
    <select
      [value]="dateRange()"
      (change)="onDateRange($event)"
      class="rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm text-slate-700 outline-none dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200"
    >
      <option value="Today">Today</option>
      <option value="This Week">This Week</option>
      <option value="This Month">This Month</option>
      <option value="Custom">Custom</option>
    </select>

    <select
      [value]="status()"
      (change)="onStatus($event)"
      class="rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm text-slate-700 outline-none dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200"
    >
      <option value="All">All Status</option>
      <option value="Pending">Pending</option>
      <option value="Completed">Completed</option>
      <option value="Shipped">Shipped</option>
      <option value="Cancelled">Cancelled</option>
    </select>
  </div>
</section>
