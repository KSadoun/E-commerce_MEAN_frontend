<section
  class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-lg shadow-slate-200/70 dark:border-slate-800 dark:bg-slate-900 dark:shadow-none"
>
  <div class="overflow-x-auto">
    <table class="min-w-full">
      <thead class="bg-slate-50 dark:bg-slate-800/70">
        <tr class="text-left text-xs uppercase tracking-wide text-slate-500 dark:text-slate-400">
          <th class="px-4 py-3">Product</th>
          <th class="px-4 py-3">Price</th>
          <th class="px-4 py-3">Stock</th>
          <th class="px-4 py-3">Status</th>
          <th class="px-4 py-3">Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (product of products(); track product.id) {
          <tr
            class="border-t border-slate-100 transition-colors hover:bg-blue-50/40 dark:border-slate-800 dark:hover:bg-blue-900/10"
          >
            <td class="px-4 py-3">
              <div class="flex items-center gap-3">
                <img
                  [src]="product.image"
                  [alt]="product.name"
                  class="h-11 w-11 rounded-lg object-cover"
                />
                <div>
                  <p class="text-sm font-semibold text-slate-900 dark:text-slate-100">
                    {{ product.name }}
                  </p>
                  <p class="text-xs text-slate-500 dark:text-slate-400">{{ product.category }}</p>
                </div>
              </div>
            </td>
            <td class="px-4 py-3 text-sm font-bold text-slate-800 dark:text-slate-100">
              {{ product.price | currency: 'USD' }}
            </td>
            <td class="px-4 py-3 text-sm text-slate-700 dark:text-slate-300">
              {{ product.stock }}
            </td>
            <td class="px-4 py-3">
              <span
                class="rounded-full px-2.5 py-1 text-xs font-semibold"
                [class.bg-emerald-100]="product.status === 'Active'"
                [class.text-emerald-700]="product.status === 'Active'"
                [class.bg-amber-100]="product.status === 'Pending'"
                [class.text-amber-700]="product.status === 'Pending'"
                [class.bg-rose-100]="product.status === 'Rejected'"
                [class.text-rose-700]="product.status === 'Rejected'"
              >
                {{ product.status }}
              </span>
            </td>
            <td class="px-4 py-3">
              <div class="flex flex-wrap gap-2">
                <button
                  type="button"
                  (click)="edit.emit(product.id)"
                  class="rounded-lg border border-blue-200 px-2.5 py-1.5 text-xs font-medium text-blue-700 transition hover:bg-blue-50"
                >
                  Edit
                </button>
                <button
                  type="button"
                  (click)="remove.emit(product.id)"
                  class="rounded-lg border border-rose-200 px-2.5 py-1.5 text-xs font-medium text-rose-700 transition hover:bg-rose-50"
                >
                  Delete
                </button>
                @if (product.status === 'Rejected') {
                  <button
                    type="button"
                    (click)="toggleStatus.emit(product.id)"
                    class="rounded-lg border border-amber-200 px-2.5 py-1.5 text-xs font-medium text-amber-700 transition hover:bg-amber-50"
                  >
                    Resubmit
                  </button>
                }
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
