<section class="mx-auto w-full max-w-7xl space-y-4">
  <app-toast-container></app-toast-container>

  <header
    class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900"
  >
    <h2 class="text-2xl font-black text-slate-900 dark:text-slate-100">Inventory Management</h2>
    <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">
      Search, filter, and manage your products while keeping stock and status up to date.
    </p>
  </header>

  <app-inventory-filters
    [search]="search()"
    [category]="category()"
    [status]="status()"
    [categories]="categoryNames()"
    (searchChange)="setSearch($event)"
    (categoryChange)="setCategory($event)"
    (statusChange)="setStatus($event)"
  ></app-inventory-filters>

  <app-products-table
    [products]="paginatedProducts()"
    (edit)="onEdit($event)"
    (remove)="onDelete($event)"
    (toggleStatus)="onToggleStatus($event)"
  ></app-products-table>

  <div
    class="flex items-center justify-between rounded-2xl border border-slate-200 bg-white px-4 py-3 shadow-sm dark:border-slate-800 dark:bg-slate-900"
  >
    <p class="text-sm text-slate-600 dark:text-slate-400">
      Showing {{ paginatedProducts().length }} of {{ filteredProducts().length }} products
    </p>
    <div class="flex items-center gap-2">
      <button
        type="button"
        (click)="prevPage()"
        [disabled]="page() === 1"
        class="rounded-lg border border-slate-200 px-3 py-1.5 text-sm font-medium text-slate-700 transition hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800"
      >
        Previous
      </button>
      <span
        class="rounded-lg bg-blue-50 px-3 py-1.5 text-sm font-semibold text-blue-700 dark:bg-blue-900/30 dark:text-blue-300"
        >Page {{ page() }} / {{ totalPages() }}</span
      >
      <button
        type="button"
        (click)="nextPage()"
        [disabled]="page() === totalPages()"
        class="rounded-lg border border-slate-200 px-3 py-1.5 text-sm font-medium text-slate-700 transition hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800"
      >
        Next
      </button>
    </div>
  </div>
</section>

@if (modalOpen()) {
  <app-product-modal
    [mode]="modalMode()"
    [productData]="selectedProduct()"
    [categories]="categories()"
    (onSave)="onSaveProduct($event)"
    (onDelete)="onDeleteProduct($event)"
    (onCancel)="closeModal()"
  ></app-product-modal>
}
