<div class="pointer-events-none fixed right-4 top-4 z-[70] flex w-[22rem] flex-col gap-2">
  @for (toast of toastService.toasts(); track toast.id) {
    <article
      class="pointer-events-auto rounded-xl border px-4 py-3 text-sm font-medium shadow-xl backdrop-blur"
      [class.border-emerald-200]="toast.type === 'success'"
      [class.bg-emerald-50/95]="toast.type === 'success'"
      [class.text-emerald-800]="toast.type === 'success'"
      [class.border-rose-200]="toast.type === 'error'"
      [class.bg-rose-50/95]="toast.type === 'error'"
      [class.text-rose-800]="toast.type === 'error'"
      [class.border-blue-200]="toast.type === 'info'"
      [class.bg-blue-50/95]="toast.type === 'info'"
      [class.text-blue-800]="toast.type === 'info'"
    >
      <div class="flex items-start justify-between gap-2">
        <p>{{ toast.message }}</p>
        <button
          type="button"
          (click)="toastService.dismiss(toast.id)"
          class="rounded-md p-1 transition hover:bg-black/5"
          aria-label="Dismiss"
        >
          <span class="material-symbols-outlined text-[16px]">close</span>
        </button>
      </div>
    </article>
  }
</div>
