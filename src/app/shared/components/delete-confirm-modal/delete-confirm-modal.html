@if (isOpen) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/55 p-4 backdrop-blur-sm">
    <div class="w-full max-w-3xl rounded-3xl bg-white p-7 shadow-2xl dark:bg-slate-900">
      <div class="flex items-start justify-between">
        <h2 class="text-4xl font-black tracking-tight text-slate-900 dark:text-slate-100">{{ title }}</h2>
        <button
          type="button"
          (click)="onCancel()"
          class="rounded-lg p-2 text-slate-500 transition-colors hover:bg-slate-100 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-slate-100"
          aria-label="Close"
        >
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <div
        class="mt-6 rounded-2xl px-5 py-4"
        [class]="
          variant === 'success'
            ? 'mt-6 rounded-2xl border border-emerald-200 bg-emerald-50 px-5 py-4 dark:border-emerald-900/40 dark:bg-emerald-950/20'
            : 'mt-6 rounded-2xl border border-rose-200 bg-rose-50 px-5 py-4 dark:border-rose-900/40 dark:bg-rose-950/20'
        "
      >
        <div class="flex items-start gap-3">
          <span
            class="material-symbols-outlined"
            [class]="
              variant === 'success'
                ? 'text-emerald-600 dark:text-emerald-400'
                : 'text-rose-600 dark:text-rose-400'
            "
          >
            {{ variant === 'success' ? 'check_circle' : 'warning' }}
          </span>
          <div>
            <p
              class="text-2xl font-bold"
              [class]="
                variant === 'success'
                  ? 'text-emerald-700 dark:text-emerald-300'
                  : 'text-rose-700 dark:text-rose-300'
              "
            >
              {{ prompt }}
            </p>
            <p
              class="mt-1 text-xl"
              [class]="
                variant === 'success'
                  ? 'text-emerald-700/90 dark:text-emerald-300/90'
                  : 'text-rose-700/90 dark:text-rose-300/90'
              "
            >
              {{ actionText }} <span class="font-bold">{{ itemName }}</span>. {{ warningText }}
            </p>
          </div>
        </div>
      </div>

      <div class="mt-7 flex justify-end gap-3">
        <button
          type="button"
          (click)="onCancel()"
          class="rounded-xl border border-slate-300 bg-white px-5 py-2.5 text-sm font-semibold text-slate-700 transition-colors hover:bg-slate-100 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800"
        >
          Cancel
        </button>
        <button
          type="button"
          (click)="onConfirm()"
          [disabled]="loading"
          [class]="
            variant === 'success'
              ? 'rounded-xl bg-emerald-600 px-5 py-2.5 text-sm font-bold text-white transition-colors hover:bg-emerald-700 disabled:cursor-not-allowed disabled:opacity-70'
              : 'rounded-xl bg-rose-600 px-5 py-2.5 text-sm font-bold text-white transition-colors hover:bg-rose-700 disabled:cursor-not-allowed disabled:opacity-70'
          "
        >
          {{ confirmText }}
        </button>
      </div>
    </div>
  </div>
}
