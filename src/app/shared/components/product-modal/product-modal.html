<div
  class="fixed inset-0 z-[65] flex items-center justify-center bg-slate-950/60 p-4 backdrop-blur-sm"
  (click)="cancel()"
>
  <section
    class="w-full max-w-2xl rounded-3xl border border-slate-200 bg-white p-6 shadow-2xl dark:border-slate-800 dark:bg-slate-900"
    (click)="$event.stopPropagation()"
  >
    <header class="mb-5 flex items-center justify-between">
      <h3 class="text-xl font-black text-slate-900 dark:text-slate-100">{{ title }}</h3>
      <button
        type="button"
        (click)="cancel()"
        class="rounded-lg p-2 hover:bg-slate-100 dark:hover:bg-slate-800"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>

    @if (mode() === 'delete') {
      <div class="space-y-4">
        <div
          class="flex items-start gap-3 rounded-xl border border-rose-200 bg-rose-50 p-4 text-rose-800 dark:border-rose-800 dark:bg-rose-950/20 dark:text-rose-300"
        >
          <span class="material-symbols-outlined mt-0.5 text-[22px]">warning</span>
          <div>
            <p class="font-bold">Delete this product?</p>
            <p class="text-sm">
              You are about to delete <span class="font-semibold">{{ productData()?.name }}</span
              >. This action cannot be undone.
            </p>
          </div>
        </div>

        <div class="flex justify-end gap-2">
          <button
            type="button"
            (click)="cancel()"
            class="rounded-lg border border-slate-200 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800"
          >
            Cancel
          </button>
          <button
            type="button"
            (click)="submit()"
            class="rounded-lg bg-rose-600 px-4 py-2 text-sm font-semibold text-white hover:bg-rose-700"
          >
            Delete Product
          </button>
        </div>
      </div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
          <label class="space-y-1 text-sm font-medium text-slate-700 dark:text-slate-200">
            <span>Product Name</span>
            <input
              formControlName="name"
              type="text"
              class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 outline-none focus:border-blue-400 dark:border-slate-700 dark:bg-slate-800"
              [class.border-amber-300]="submitted() && form.controls.name.invalid"
            />
          </label>

          <label class="space-y-1 text-sm font-medium text-slate-700 dark:text-slate-200">
            <span>Category</span>
            <select
              formControlName="categoryId"
              class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 outline-none focus:border-blue-400 dark:border-slate-700 dark:bg-slate-800"
              [class.ring-2]="changedFields().has('categoryId')"
              [class.ring-blue-200]="changedFields().has('categoryId')"
            >
              @for (category of categories(); track category.id) {
                <option [ngValue]="category.id">{{ category.name }}</option>
              }
            </select>
          </label>

          <label class="space-y-1 text-sm font-medium text-slate-700 dark:text-slate-200">
            <span>Price</span>
            <input
              formControlName="price"
              type="number"
              min="1"
              class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 outline-none focus:border-blue-400 dark:border-slate-700 dark:bg-slate-800"
              [class.ring-2]="changedFields().has('price')"
              [class.ring-blue-200]="changedFields().has('price')"
            />
          </label>

          <label class="space-y-1 text-sm font-medium text-slate-700 dark:text-slate-200">
            <span>Stock Quantity</span>
            <input
              formControlName="stock"
              type="number"
              min="0"
              class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 outline-none focus:border-blue-400 dark:border-slate-700 dark:bg-slate-800"
              [class.ring-2]="changedFields().has('stock')"
              [class.ring-blue-200]="changedFields().has('stock')"
            />
          </label>
        </div>

        <label class="space-y-1 text-sm font-medium text-slate-700 dark:text-slate-200">
          <span>Description</span>
          <textarea
            formControlName="description"
            rows="3"
            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 outline-none focus:border-blue-400 dark:border-slate-700 dark:bg-slate-800"
            [class.ring-2]="changedFields().has('description')"
            [class.ring-blue-200]="changedFields().has('description')"
          ></textarea>
        </label>

        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
          <label class="space-y-1 text-sm font-medium text-slate-700 dark:text-slate-200">
            <span>Product Image (jpg/png)</span>
            <input
              type="file"
              accept="image/jpeg,image/png"
              (change)="onFileSelected($event)"
              class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm outline-none file:mr-3 file:rounded-md file:border-0 file:bg-blue-100 file:px-2 file:py-1 file:font-medium file:text-blue-700 dark:border-slate-700 dark:bg-slate-800 dark:file:bg-blue-900/40 dark:file:text-blue-300"
            />
          </label>

          <div
            class="rounded-xl border border-slate-200 bg-slate-50 p-2 dark:border-slate-700 dark:bg-slate-800"
          >
            @if (imagePreview()) {
              <img
                [src]="imagePreview()"
                alt="Preview"
                class="h-24 w-full rounded-lg object-cover"
              />
            } @else {
              <div class="flex h-24 items-center justify-center text-sm text-slate-500">
                No preview
              </div>
            }
          </div>
        </div>

        <div class="flex justify-end gap-2 pt-2">
          <button
            type="button"
            (click)="cancel()"
            class="rounded-lg border border-slate-200 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="rounded-lg bg-gradient-to-r from-blue-600 to-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-blue-600/30 hover:from-blue-700 hover:to-indigo-700"
          >
            {{ mode() === 'add' ? 'Add Product' : 'Save Changes' }}
          </button>
        </div>
      </form>
    }
  </section>
</div>
